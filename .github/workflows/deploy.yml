name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 🔧 Cargar NVM y usar Node correcto
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22

            # 🚀 Deploy
            cd ~/cachecito-frontend

            git fetch --all
            git reset --hard origin/main

            npm install
            npm run build

            rm -rf /var/www/cachecito/*
            mkdir -p /var/www/cachecito
            cp -r dist/* /var/www/cachecito/

            chown -R www-data:www-data /var/www/cachecito
            chmod -R 755 /var/www/cachecito

            systemctl restart nginx

            echo "✅ Deploy completado"
