name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 22
          key_path: key.pem
          script: |
            # 🔐 reconstruir clave privada desde base64
            echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > key.pem
            chmod 600 key.pem

            # ⚙️ cargar NVM + Node (IMPORTANTE)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            # 🚀 deploy
            cd ~/cachecito-frontend
            git fetch --all
            git reset --hard origin/main

            npm install
            npm run build

            rm -rf /var/www/cachecito/*
            mkdir -p /var/www/cachecito
            cp -r dist/* /var/www/cachecito/

            chown -R www-data:www-data /var/www/cachecito
            chmod -R 755 /var/www/cachecito

            systemctl restart nginx

            echo "✅ Deploy completado"
